<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranni Questline – Elden Ring Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c8921a; --gold-light: #f0c060; --gold-dim: #a07840;
    --bg: #0e0c08; --bg-card: #141209; --bg-card-hover: #1a1610;
    --border: #2a2218; --border-gold: #3a2a10;
    --text-primary: #e8d8b0; --text-secondary: #9a8868; --text-muted: #5a5040;
    --radius: 10px; --radius-sm: 6px;
    --blue: #4a7ab5; --blue-dim: #2a4a70;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7; min-height: 100vh; padding: 2rem 1rem 4rem; }

  #gate { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem; }
  .gate-card { background:var(--bg-card); border:0.5px solid #2a3a5a; border-radius:var(--radius); padding:2.5rem 2rem; max-width:400px; width:100%; text-align:center; }
  .gate-eyebrow { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:#4a7ab5; margin-bottom:0.5rem; text-transform:uppercase; }
  .gate-title { font-family:'Cinzel',serif; font-size:22px; color:#a0c0f0; margin-bottom:0.5rem; }
  .gate-sub { font-size:13px; color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.6; }
  .gate-input { width:100%; padding:10px 14px; font-size:14px; border-radius:var(--radius-sm); border:0.5px solid var(--border); background:#0a0906; color:var(--text-primary); outline:none; font-family:'Inter',sans-serif; transition:border-color 0.2s; margin-bottom:0.75rem; }
  .gate-input:focus { border-color:#4a7ab5; }
  .gate-btn { width:100%; padding:10px 14px; font-size:14px; border-radius:var(--radius-sm); border:0.5px solid #4a7ab5; background:transparent; color:#4a7ab5; cursor:pointer; font-family:'Inter',sans-serif; transition:background 0.15s; }
  .gate-btn:hover { background:#4a7ab515; }
  .gate-error { font-size:12px; color:#c04040; margin-top:0.5rem; display:none; }
  #main { display:none; }

  .container { max-width: 680px; margin: 0 auto; }
  .hero { position: relative; border: 0.5px solid #2a3a5a; border-radius: var(--radius); padding: 2.5rem 2rem 2rem; margin-bottom: 2rem; overflow: hidden; background: #080c14; }
  .hero::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%234a7ab5' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); pointer-events: none; }
  .hero-eyebrow { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; color: #4a7ab5; margin-bottom: 0.5rem; text-transform: uppercase; }
  .hero-title { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 500; color: #a0c0f0; margin-bottom: 0.25rem; }
  .hero-sub { font-size: 13px; color: var(--text-secondary); }

  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #4a7ab5; text-decoration: none; margin-bottom: 1.5rem; transition: color 0.2s; }
  .back-link:hover { color: #a0c0f0; }

  .step { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
  .step-header { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .step-header:hover { background: var(--bg-card-hover); }
  .step-num { width: 32px; height: 32px; border-radius: 50%; background: #4a7ab518; border: 0.5px solid #4a7ab530; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 13px; color: #4a7ab5; flex-shrink: 0; }
  .step-title { flex: 1; }
  .step-title h3 { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .step-title p { font-size: 12px; color: var(--text-muted); }
  .chevron { color: var(--text-muted); font-size: 16px; transition: transform 0.25s ease; }
  .chevron.open { transform: rotate(180deg); }

  .step-body { border-top: 0.5px solid var(--border); padding: 1.25rem 1.5rem; display: none; }
  .step-body.open { display: block; }
  .step-body p { font-size: 14px; color: var(--text-secondary); line-height: 1.85; margin-bottom: 0.75rem; }
  .step-body p:last-child { margin-bottom: 0; }

  .map-img { width: 100%; border-radius: var(--radius-sm); border: 0.5px solid var(--border); margin: 1rem 0; display: block; }
  .map-caption { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: -0.5rem; margin-bottom: 0.75rem; }

  .tip-box { background: #0a0c14; border: 0.5px solid #2a3a5a; border-radius: var(--radius-sm); padding: 10px 14px; margin: 1rem 0; font-size: 13px; color: #4a7ab5; line-height: 1.6; }
  .warning-box { background: #1a1208; border: 0.5px solid var(--border-gold); border-radius: var(--radius-sm); padding: 10px 14px; margin: 1rem 0; font-size: 13px; color: var(--gold-dim); line-height: 1.6; }

  .progress { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; cursor: pointer; }
  .progress-dot.active { background: #4a7ab5; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="gate-eyebrow">Questline guide</div>
    <div class="gate-title">🌙 Ranni the Witch</div>
    <div class="gate-sub">Denne guiden er låst. Spør meg om koden når du er klar for Ranni sin questline!</div>
    <input class="gate-input" type="password" id="gate-input" placeholder="Skriv inn kode..." onkeydown="if(event.key==='Enter') checkGate()">
    <button class="gate-btn" onclick="checkGate()">Lås opp</button>
    <div class="gate-error" id="gate-error">Feil kode – prøv igjen!</div>
  </div>
</div>

<div id="main">
<div class="container">
  <a href="/" class="back-link">← Tilbake til guiden</a>
  <div class="hero">
    <div class="hero-eyebrow">Questline guide</div>
    <div class="hero-title">🌙 Ranni the Witch</div>
    <div class="hero-sub">En av spillets lengste og mest ambisiøse historier – fra Liurnia til stjernene</div>
  </div>
  <div class="progress" id="progress-dots"></div>
  <div id="steps-container"></div>
</div>
</div>

<script>
const BASE = '/images/';

const STEPS = [
  {
    num: 1,
    title: "Church of Elleh, Limgrave",
    location: "Tidlig i spillet – Limgrave",
    text: [
      "Du har allerede møtt Ranni uten å vite det! Den mystiske blå skikkelsen som ga deg Spirit Calling Bell og Lone Wolf Ashes ved Church of Elleh tidlig i spillet – det var henne. Hun kalte seg Renna da.",
      "Dette skjer automatisk etter at du har fått hesten din. Ingenting å gjøre her annet enn å huske møtet."
    ]
  },
  {
    num: 2,
    title: "Caria Manor, Liurnia",
    location: "Nordvest i Liurnia",
    text: [
      "For å nå Ranni's Rise må du gjennom Caria Manor nordvest i Liurnia – et slott fylt med edderkoppelignende hender. Det er ubehagelig, men verdt det.",
      "Slå bossen Royal Knight Loretta inne i hagen, og veien åpner seg til Three Sisters-platået bak borgen."
    ]
  },
  {
    num: 3,
    title: "Ranni's Rise – Start questlinen",
    location: "Three Sisters, nordvest Liurnia",
    text: [
      "På platået finner du tre tårn tett ved hverandre. Gå inn i det midterste – Ranni's Rise – og klatr opp til toppen. Snakk med Ranni og takk ja til å tjene henne.",
      "Gå ned igjen og snakk med hennes tre tjenere på bakkeplan: Blaidd (ulvemannen), Iji (den store smeden) og Seluvis (den ubehagelige trollmannen). Tøm dialogen til alle tre."
    ],
    img: "Ranni-rise.png",
    imgCaption: "Ranni's Rise – det midterste av de tre tårnene"
  },
  {
    num: 4,
    title: "Blaidd i Siofra River",
    location: "Østlige Limgrave",
    text: [
      "Blaidd vil at du møter ham under bakken. Finn Siofra River Well i østlige Limgrave, like nord for Minor Erdtree. Ta heisen ned.",
      "Arbeid deg nordover og øst gjennom Siofra River. Finn Blaidd bak en av de store brosøylene. Han forteller at veien til Nokron er blokkert og ber deg snakke med Seluvis."
    ],
    img: "Siofran-river-well.png",
    imgCaption: "Siofra River Well – ta heisen ned her",
    img2: "Siofran-river.png",
    img2Caption: "Finn Blaidd her inne i Siofra River"
  },
  {
    num: 5,
    title: "Seluvis og Sorceress Sellen",
    location: "Three Sisters → Waypoint Ruins, Limgrave",
    text: [
      "Gå tilbake til Three Sisters og snakk med Seluvis i det sørligste tårnet. Han sender deg til Sorceress Sellen i Waypoint Ruins i Limgrave.",
      "Finn Waypoint Ruins i Limgrave og bekjemp Mad Pumpkin Head ved inngangen. Sellen sitter i kjelleren under ruinene. Vis henne brevet fra Seluvis – hun forteller deg at Starscourge Radahn må dø for å åpne veien til Nokron."
    ],
    img: "Sorceress-sellen.png",
    imgCaption: "Sorceress Sellen – finn henne i kjelleren under Waypoint Ruins"
  },
  {
    num: 6,
    title: "Starscourge Radahn, Redmane Castle",
    location: "Sørlige Caelid",
    text: [
      "Dra til Redmane Castle helt sør i Caelid. Bruk Waygate ved Impassible Greatbridge for å komme inn i borgen. Snakk med Festival Master på rampen og si deg klar.",
      "En ny Waygate tar deg til Wailing Dunes og kampen mot Radahn – en av spillets største og mest episke bossfighter. Etter seieren faller en stjerne ned i Limgrave og åpner inngangen til Nokron."
    ],
    img: "Rednmane-castle.png",
    imgCaption: "Redmane Castle – Radahn-festivalen holdes her"
  },
  {
    num: 7,
    title: "Frigjør Blaidd – Forlorn Hound Evergaol",
    location: "Sør for Agheel Lake, Limgrave",
    text: [
      "Blaidd er ikke ved krateret som forventet. Dra heller til Forlorn Hound Evergaol sør for Agheel Lake South Site of Grace i Limgrave.",
      "Snap fingrene i midten av sirkelen og snakk med Blaidd for å frigjøre ham. Gå deretter tilbake til War Counselor Iji ved Road to the Manor i Liurnia og snakk med ham om Blaidd."
    ],
    img: "Forlon-hound-evergaol.png",
    imgCaption: "Forlorn Hound Evergaol – snap fingrene i midten for å frigjøre Blaidd",
    img2: "Iji.png",
    img2Caption: "War Counselor Iji – snakk med ham etterpå"
  },
  {
    num: 8,
    title: "Nokron, Eternal City",
    location: "Sørøst for Mistwood Ruins, Limgrave",
    text: [
      "Sørøst for Mistwood Ruins er det nå et gigantisk krater med svevende steiner i luften. Klatr ned langs sørsiden og spiral moturs nedover – start på sør/øst-siden.",
      "Følg tunellen nordover til du når taket av Nokron, Eternal City. Arbeid deg gjennom byen, slå Mimic Tear-bossen og fortsett til Ancestral Woods Site of Grace."
    ],
    img: "Nokron.png",
    imgCaption: "Nokron, Eternal City – klatr ned i krateret sørøst for Mistwood"
  },
  {
    num: 9,
    title: "Fingerslayer Blade",
    location: "Night's Sacred Ground, Nokron",
    text: [
      "Fra Ancestral Woods Site of Grace – dropp ned til Night's Sacred Ground og følg veien nordover. Du finner en kiste med Fingerslayer Blade inne i et helligdom. Dette er det Ranni trenger.",
      "Gå tilbake til Ranni's Rise i Liurnia og gi henne Fingerslayer Blade. Hun gir deg Carian Inverted Statue til gjengjeld og forteller at hun legger ut på en mørk reise."
    ],
    img: "Nokron2.png",
    imgCaption: "Night's Sacred Ground – Fingerslayer Blade er gjemt her inne"
  },
  {
    num: 10,
    title: "Carian Study Hall",
    location: "Øst-Liurnia",
    text: [
      "Halvveis opp østsiden av Liurnia finner du Carian Study Hall. Gå inn og plasser Carian Inverted Statue på pidestallen foran globen i hovedhallen. Bygningen snur seg opp ned!",
      "Kjemp deg gjennom den inverterte versjonen og følg broen østover til Divine Tower of Liurnia. Ta heisen opp til toppen og hent Cursemark of Death fra kroppen der."
    ],
    img: "Carian-study-hall.png",
    imgCaption: "Carian Study Hall – plasser statuen på pidestallen for å snu bygningen"
  },
  {
    num: 11,
    title: "Renna's Rise og Ainsel River",
    location: "Three Sisters → Ainsel River",
    text: [
      "Gå til det nordligste tårnet på Three Sisters-platået – Renna's Rise (Renna, ikke Ranni). Klatr opp og bruk Waygaten på toppen.",
      "Du ankommer Ainsel River Main under bakken. Like ved ankomst ligger en liten Miniature Ranni-dukke på en kiste – ta den med. Gå til et Site of Grace og velg å snakke med den. Gjør det flere ganger til hun svarer."
    ],
    img: "Ansel-river-Nokstella-eternal-ci....png",
    imgCaption: "Ainsel River og Nokstella, Eternal City – du ankommer her"
  },
  {
    num: 12,
    title: "Baleful Shadow, Nokstella",
    location: "Nokstella Waterfall Basin",
    text: [
      "Utforsk Nokstella Eternal City og arbeid deg mot Nokstella Waterfall Basin i vest. Følg tunnelen sørover forbi basilisker – pass deg for disse, de gir deg instant death-status.",
      "Du møter Baleful Shadow – en mørk invasjonsfiende. Slå den og hent Discarded Palace Key. Snakk med Miniature Ranni etterpå.",
      "Ta deretter heisen videre ned til Lake of Rot Shoreline Site of Grace."
    ]
  },
  {
    num: 13,
    title: "Dark Moon Ring – Rennala",
    location: "Raya Lucaria Grand Library",
    text: [
      "Gå til Raya Lucaria Grand Library der Rennala sitter. Åpne den låste kisten på nordsiden av rommet med Discarded Palace Key.",
      "Du finner Dark Moon Ring inne i den. Du trenger denne for å komme videre."
    ],
    tip: "💡 Du kan respec karakteren din hos Rennala nå hvis du vil – nyttig for endgame builds!"
  },
  {
    num: 14,
    title: "Lake of Rot",
    location: "Under Nokstella",
    text: [
      "Gå tilbake til Lake of Rot Shoreline Site of Grace. Ha Preserving Boluses klare – innsjøen er fylt med Scarlet Rot som tærer på deg konstant.",
      "Bruk knappene rundt i innsjøen for å heve trygg mark og kryss til sørsiden. Finn Grand Cloister og følg rotfossen sørover. Finn en koffert/kiste perched ved toppen av en rotfoss – legg deg i den."
    ],
    img: "Lake-of-rot.png",
    imgCaption: "Lake of Rot – bruk knappene for å heve plattformer og kryss til sørsiden"
  },
  {
    num: 15,
    title: "Astel, Naturalborn of the Void",
    location: "Hulen etter Lake of Rot",
    text: [
      "Kofferten bringer deg til en ny hule. Følg veien nordover til en tåkevegg.",
      "Der inne venter Astel – et av spillets mest surrealistiske og bisarre vesener. Et gigantisk romvesen laget av stjerner og mørke. Ta deg god tid til å lære movesetet – hold deg unna hodet og vær tålmodig.",
      "Etter seieren tar heisen nordover deg opp til Moonlight Altar."
    ]
  },
  {
    num: 16,
    title: "Moonlight Altar og Ranni",
    location: "Sørvestlige Liurnia",
    text: [
      "Du ankommer Moonlight Altar – et lite platå høyt oppe i sørvestlige Liurnia med utsikt over hele verden. Kjemp deg forbi Glintstone Dragon Adula på veien.",
      "Finn Cathedral of Manus Celes og dropp forsiktig ned i hullen sør for Site of Grace. Følg tunnelen til du finner Ranni. Sett på ringen når du får valget.",
      "Questlinen er fullført. Nyt øyeblikket – du fortjener det. 🌙"
    ],
    img: "Moonlight-altar.png",
    imgCaption: "Moonlight Altar – Ranni venter her inne i Cathedral of Manus Celes"
  }
];

function checkGate() {
  const inp = document.getElementById('gate-input');
  const err = document.getElementById('gate-error');
  if (inp.value.trim().toLowerCase() === 'ranni') {
    try { localStorage.setItem('ranni_unlocked', '1'); } catch(e) {}
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } else {
    err.style.display = 'block';
    inp.style.borderColor = '#803030';
    setTimeout(() => { err.style.display = 'none'; inp.style.borderColor = ''; }, 2000);
  }
}

(function() {
  try { if (localStorage.getItem('ranni_unlocked') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  }} catch(e) {}
})();

function renderStep(s) {
  return `
  <div class="step" id="step-${s.num}">
    <div class="step-header" onclick="toggleStep(${s.num})">
      <div class="step-num">${s.num}</div>
      <div class="step-title">
        <h3>${s.title}</h3>
        <p>${s.location}</p>
      </div>
      <span class="chevron" id="chev-${s.num}">▼</span>
    </div>
    <div class="step-body" id="body-${s.num}">
      ${s.img ? `<img src="${BASE}${s.img}" alt="${s.imgCaption}" class="map-img" loading="lazy"><p class="map-caption">${s.imgCaption}</p>` : ''}
      ${s.text ? s.text.map(t => `<p>${t}</p>`).join('') : ''}
      ${s.img2 ? `<img src="${BASE}${s.img2}" alt="${s.img2Caption}" class="map-img" loading="lazy"><p class="map-caption">${s.img2Caption}</p>` : ''}
      ${s.tip ? `<div class="tip-box">${s.tip}</div>` : ''}
      ${s.warning ? `<div class="warning-box">⚠️ ${s.warning}</div>` : ''}
    </div>
  </div>`;
}

function toggleStep(num) {
  const body = document.getElementById('body-' + num);
  const chev = document.getElementById('chev-' + num);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

document.getElementById('steps-container').innerHTML = STEPS.map(renderStep).join('');
document.getElementById('progress-dots').innerHTML = STEPS.map((s,i) => 
  `<div class="progress-dot" onclick="document.getElementById('step-${s.num}').scrollIntoView({behavior:'smooth'})" title="Steg ${s.num}: ${s.title}"></div>`
).join('');
</script>
</body>
</html>
